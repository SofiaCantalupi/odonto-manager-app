<div class="tooth-container relative">
  <svg
    class="tooth-svg"
    viewBox="0 0 100 100"
    xmlns="http://www.w3.org/2000/svg"
    [attr.aria-label]="'Tooth ' + toothNumber"
    role="img"
  >
    <!-- Tooth number label (hidden but accessible) -->
    <title>Tooth {{ toothNumber }}</title>

    <!-- Top Zone (Vestibular) -->
    <polygon
      [attr.points]="zones.top"
      class="tooth-zone"
      [attr.fill]="getZoneFill('top')"
      [attr.stroke]="getZoneStroke('top')"
      role="presentation"
      [attr.aria-label]="getTooltip('top')"
    >
      <title>{{ getTooltip('top') }}</title>
    </polygon>

    <!-- Bottom Zone (Lingual/Palatal) -->
    <polygon
      [attr.points]="zones.bottom"
      class="tooth-zone"
      [attr.fill]="getZoneFill('bottom')"
      [attr.stroke]="getZoneStroke('bottom')"
      role="presentation"
      [attr.aria-label]="getTooltip('bottom')"
    >
      <title>{{ getTooltip('bottom') }}</title>
    </polygon>

    <!-- Left Zone (Mesial) -->
    <polygon
      [attr.points]="zones.left"
      class="tooth-zone"
      [attr.fill]="getZoneFill('left')"
      [attr.stroke]="getZoneStroke('left')"
      role="presentation"
      [attr.aria-label]="getTooltip('left')"
    >
      <title>{{ getTooltip('left') }}</title>
    </polygon>

    <!-- Right Zone (Distal) -->
    <polygon
      [attr.points]="zones.right"
      class="tooth-zone"
      [attr.fill]="getZoneFill('right')"
      [attr.stroke]="getZoneStroke('right')"
      role="presentation"
      [attr.aria-label]="getTooltip('right')"
    >
      <title>{{ getTooltip('right') }}</title>
    </polygon>

    <!-- Center Zone (Occlusal) - Drawn last to be on top -->
    <polygon
      [attr.points]="zones.center"
      class="tooth-zone"
      [attr.fill]="getZoneFill('center')"
      [attr.stroke]="getZoneStroke('center')"
      role="presentation"
      [attr.aria-label]="getTooltip('center')"
    >
      <title>{{ getTooltip('center') }}</title>
    </polygon>

    <!-- ========== OVERLAYS FOR WHOLE-TOOTH TREATMENTS ========== -->

    <!-- Cross Overlay (X) for Extraction (Blue) or Missing (Red) -->
    @if (hasCrossOverlay) {
      <g class="cross-overlay" pointer-events="none">
        <line
          x1="5"
          y1="5"
          x2="95"
          y2="95"
          [attr.stroke]="crossColor"
          stroke-width="4"
          stroke-linecap="round"
        />
        <line
          x1="95"
          y1="5"
          x2="5"
          y2="95"
          [attr.stroke]="crossColor"
          stroke-width="4"
          stroke-linecap="round"
        />
      </g>
    }

    <!-- Circle Overlay for Crown (Black outline, transparent fill) -->
    @if (hasCircleOverlay) {
      <circle
        class="circle-overlay"
        cx="50"
        cy="50"
        r="45"
        fill="transparent"
        [attr.stroke]="crownColor"
        stroke-width="3"
        pointer-events="none"
      />
    }
  </svg>
</div>

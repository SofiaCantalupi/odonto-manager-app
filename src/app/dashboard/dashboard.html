<div class="bg-gray-50 grid grid-cols-[256px_1fr]">
  
  <!-- Sidebar -->
  <nz-sider nzWidth="256px" nzTheme="light" class="shadow-lg">
    <!-- Logo/Brand -->
    <div class="p-6 border-b border-gray-200">
      <h1 class="text-2xl font-bold text-blue-600">DentalManager</h1>
      <p class="text-xs text-gray-500 mt-1">Practice Management</p>
    </div>

    <!-- Navigation Menu -->
    <nav class="flex-1 p-4 space-y-2">
      @for (item of menuItems; track item.route) {
        <button
          (click)="onMenuItemClick(item)"
          [class]="
            item.active
              ? 'w-full flex items-center space-x-3 px-4 py-3 rounded-lg bg-blue-50 text-blue-600 font-medium transition-all duration-200'
              : 'w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-200'
          "
        >
          <lucide-icon [img]="item.icon" [size]="20"></lucide-icon>
          <span>{{ item.label }}</span>
        </button>
      }
    </nav>

    <!-- User Profile (Bottom of Sidebar) -->
    <div class="p-4 border-t border-gray-200">
      <div
        class="flex items-center space-x-3 p-3 rounded-lg hover:bg-gray-50 cursor-pointer transition-all duration-200"
      >
        <img
          [src]="currentUser.avatar"
          [alt]="currentUser.name"
          class="w-10 h-10 rounded-full ring-2 ring-blue-100"
        />
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-900 truncate">{{ currentUser.name }}</p>
          <p class="text-xs text-gray-500 truncate">{{ currentUser.role }}</p>
        </div>
      </div>
    </div>
  </nz-sider>

  <!--Header + Content-->
  <div class="flex flex-col">
    
    <!-- Header -->
    @if (isHomePage) {
      <div class="bg-white shadow-sm px-8 py-6 shrink-0">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="text-3xl font-bold text-gray-900">Dashboard</h2>
            <p class="text-gray-600 mt-1">
              Welcome back, {{ currentUser.name.split(' ')[1] }}!
            </p>
          </div>
          <button (click)="onCreateNewPatient()" nz-button nzType="primary">
            Create New Patient
          </button>
        </div>
      </div>
    }

    <!-- Content -->
    <div class="flex-1 overflow-auto bg-gray-50 p-8">
        <router-outlet></router-outlet>
    </div>

  </div>

</div>
